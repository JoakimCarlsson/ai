<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Voice Agent Demo</title>
    <style>
      :root {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
        color-scheme: dark;
      }
      body {
        margin: 0;
        background: #0d1117;
        color: #e6edf3;
        display: flex;
        flex-direction: column;
        align-items: stretch;
        min-height: 100vh;
      }
      header {
        padding: 16px 24px;
        border-bottom: 1px solid #21262d;
        display: flex;
        align-items: center;
        gap: 16px;
      }
      header h1 {
        font-size: 16px;
        font-weight: 600;
        margin: 0;
      }
      #status {
        font-size: 13px;
        color: #7d8590;
      }
      main {
        flex: 1;
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 16px;
        padding: 16px 24px;
        min-height: 0;
      }
      section {
        display: flex;
        flex-direction: column;
        gap: 8px;
        min-height: 0;
      }
      h2 {
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        color: #7d8590;
        margin: 0;
      }
      .log {
        flex: 1;
        overflow-y: auto;
        background: #161b22;
        border: 1px solid #21262d;
        border-radius: 6px;
        padding: 12px;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 13px;
        line-height: 1.5;
        white-space: pre-wrap;
        word-break: break-word;
      }
      .log .partial { color: #7d8590; }
      .log .final { color: #e6edf3; }
      .log .delta { color: #79c0ff; }
      .log .tool { color: #d2a8ff; }
      .log .error { color: #ff7b72; }
      .log .info { color: #56d364; }
      footer {
        padding: 16px 24px;
        border-top: 1px solid #21262d;
        display: flex;
        gap: 12px;
        align-items: center;
      }
      button {
        padding: 8px 16px;
        font-size: 14px;
        font-weight: 500;
        border-radius: 6px;
        border: 1px solid #30363d;
        background: #21262d;
        color: #e6edf3;
        cursor: pointer;
      }
      button:hover:not(:disabled) {
        background: #30363d;
      }
      button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
      button.primary {
        background: #1f6feb;
        border-color: #1f6feb;
      }
      button.primary:hover:not(:disabled) {
        background: #388bfd;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Voice Agent Demo</h1>
      <div id="status">disconnected</div>
    </header>
    <main>
      <section>
        <h2>Conversation</h2>
        <div id="conversation" class="log"></div>
      </section>
      <section>
        <h2>Events</h2>
        <div id="events" class="log"></div>
      </section>
    </main>
    <footer>
      <button id="start" class="primary">Start</button>
      <button id="stop" disabled>Stop</button>
    </footer>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
